<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>45-45-90 Triangle Drag and Drop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 24px;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 1.6rem;
    }

    .instructions {
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .activity {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 24px;
      align-items: start;
    }

    .triangle-area {
      position: relative;
      height: 420px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fcfcfc;
      overflow: hidden;
    }

    svg {
      width: 100%;
      height: 100%;
    }

    .drop-zone {
      position: absolute;
      min-width: 108px;
      min-height: 42px;
      border: 2px dashed #777;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #666;
      text-align: center;
      padding: 4px;
      box-sizing: border-box;
    }

    .drop-zone.over {
      background: #eef6ff;
      border-color: #1e73be;
    }

    .drop-zone.correct {
      border-color: #1d8f3a;
      background: #eaf8ee;
    }

    .drop-zone.incorrect {
      border-color: #c53030;
      background: #fff0f0;
    }

    /* Position each drop zone near the corresponding side */
    #leg-one-zone {
      left: 92px;
      top: 220px;
    }

    #leg-two-zone {
      left: 250px;
      top: 345px;
    }

    #hypotenuse-zone {
      left: 335px;
      top: 160px;
    }

    .choices {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
      background: #fafafa;
    }

    .choices h2 {
      margin-top: 0;
      font-size: 1.1rem;
    }

    .draggable {
      padding: 10px 14px;
      margin: 10px 0;
      border-radius: 8px;
      background: white;
      border: 1px solid #bbb;
      cursor: grab;
      text-align: center;
      font-size: 1.05rem;
      font-weight: bold;
      user-select: none;
    }

    .draggable:active {
      cursor: grabbing;
    }

    .buttons {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      background: #1e73be;
      color: white;
    }

    button.secondary {
      background: #666;
    }

    #feedback {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      background: #f1f1f1;
      min-height: 24px;
      line-height: 1.4;
    }

    .angle-label {
      font-size: 18px;
      font-weight: bold;
      fill: #222;
    }

    .small-note {
      font-size: 0.9rem;
      color: #555;
      margin-top: 10px;
    }

    @media (max-width: 760px) {
      .activity {
        grid-template-columns: 1fr;
      }

      .triangle-area {
        height: 360px;
      }

      #leg-one-zone {
        left: 55px;
        top: 195px;
      }

      #leg-two-zone {
        left: 195px;
        top: 300px;
      }

      #hypotenuse-zone {
        left: 245px;
        top: 135px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>45-45-90 Triangle</h1>
    <p class="instructions">
      Drag each description to the correct side of the triangle. Use the angles to determine if the side opposite is a leg or the hypotenuse. 
    </p>

    <div class="activity">
      <div class="triangle-area" aria-label="45-45-90 right triangle activity">
        <svg viewBox="0 0 600 420" role="img" aria-label="A right triangle with angles 45 degrees, 45 degrees, and 90 degrees">
          <!-- Triangle points create an isosceles right triangle: both legs are equal length -->
          <polygon points="120,340 420,340 120,40" fill="#eef5ff" stroke="#222" stroke-width="4" />

          <!-- Right angle marker -->
          <polyline points="120,310 150,310 150,340" fill="none" stroke="#222" stroke-width="3" />

          <!-- Angle labels -->
          <text x="132" y="322" class="angle-label">90°</text>
          <text x="138" y="75" class="angle-label">45°</text>
          <text x="370" y="324" class="angle-label">45°</text>
        </svg>

        <div class="drop-zone" id="leg-one-zone" data-answer="leg">drop here</div>
        <div class="drop-zone" id="leg-two-zone" data-answer="leg">drop here</div>
        <div class="drop-zone" id="hypotenuse-zone" data-answer="hypotenuse">drop here</div>
      </div>

      <div class="choices">
        <h2>Side Descriptions</h2>
        <div class="draggable" draggable="true" id="choice-leg-one" data-value="leg">leg</div>
        <div class="draggable" draggable="true" id="choice-leg-two" data-value="leg">leg</div>
        <div class="draggable" draggable="true" id="choice-hypotenuse" data-value="hypotenuse">hypotenuse</div>

        <div class="buttons">
          <button onclick="checkAnswers()">Check Answers</button>
          <button class="secondary" onclick="resetActivity()">Reset</button>
        </div>

        <div id="feedback" aria-live="polite"></div>

      </div>
    </div>
  </div>

  <script>
    const draggables = document.querySelectorAll('.draggable');
    const dropZones = document.querySelectorAll('.drop-zone');
    const choicesBox = document.querySelector('.choices');
    const feedback = document.getElementById('feedback');

    draggables.forEach(item => {
      item.addEventListener('dragstart', event => {
        event.dataTransfer.setData('text/plain', event.target.id);
      });
    });

    dropZones.forEach(zone => {
      zone.addEventListener('dragover', event => {
        event.preventDefault();
        zone.classList.add('over');
      });

      zone.addEventListener('dragleave', () => {
        zone.classList.remove('over');
      });

      zone.addEventListener('drop', event => {
        event.preventDefault();
        zone.classList.remove('over');

        const draggedId = event.dataTransfer.getData('text/plain');
        const draggedElement = document.getElementById(draggedId);

        // If the zone already has an answer, move it back to choices.
        const existing = zone.querySelector('.draggable');
        if (existing) {
          choicesBox.insertBefore(existing, document.querySelector('.buttons'));
        }

        zone.textContent = '';
        zone.appendChild(draggedElement);
        zone.classList.remove('correct', 'incorrect');
        feedback.textContent = '';
      });
    });

    choicesBox.addEventListener('dragover', event => {
      event.preventDefault();
    });

    choicesBox.addEventListener('drop', event => {
      event.preventDefault();
      const draggedId = event.dataTransfer.getData('text/plain');
      const draggedElement = document.getElementById(draggedId);
      choicesBox.insertBefore(draggedElement, document.querySelector('.buttons'));
      feedback.textContent = '';
    });

    function checkAnswers() {
      let correctCount = 0;
      const incorrectHints = [];

      dropZones.forEach(zone => {
        const placed = zone.querySelector('.draggable');
        zone.classList.remove('correct', 'incorrect');

        if (!placed) {
          zone.classList.add('incorrect');
          incorrectHints.push('One or more sides are still missing a label.');
          return;
        }

        if (placed.dataset.value === zone.dataset.answer) {
          zone.classList.add('correct');
          correctCount++;
        } else {
          zone.classList.add('incorrect');
          incorrectHints.push(getHint(zone.id));
        }
      });

      if (correctCount === 3) {
        feedback.textContent = 'Correct! In a 45-45-90 triangle, the two sides opposite the 45° angles are legs, and the side opposite the 90° angle is the hypotenuse.';
      } else {
        const uniqueHints = [...new Set(incorrectHints)];
        feedback.innerHTML = 'Not quite. Check the side-angle relationships:<br>' + uniqueHints.map(hint => `• ${hint}`).join('<br>');
      }
    }

    function getHint(zoneId) {
      if (zoneId === 'leg-one-zone') {
        return 'This side is opposite a 45° angle, so it is one of the congruent legs.';
      }

      if (zoneId === 'leg-two-zone') {
        return 'This side is opposite a 45° angle, so it is one of the congruent legs.';
      }

      if (zoneId === 'hypotenuse-zone') {
        return 'The side opposite 90° is always the hypotenuse.';
      }

      return 'Use the angle opposite the side to decide its label.';
    }

    function resetActivity() {
      dropZones.forEach(zone => {
        const placed = zone.querySelector('.draggable');
        if (placed) {
          choicesBox.insertBefore(placed, document.querySelector('.buttons'));
        }
        zone.textContent = 'drop here';
        zone.classList.remove('correct', 'incorrect', 'over');
      });

      feedback.textContent = '';
    }
  </script>
</body>
</html>
